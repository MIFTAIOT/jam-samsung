<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMOLED Smart Clock - Final Edition</title>
    <!-- Import Font Keren dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 1s ease;
        }

        /* Layar Pembuka untuk Izin Audio & Fullscreen */
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000000;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            cursor: pointer;
            flex-direction: column;
        }

        #start-screen h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #b33939;
        }

        #clock-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #b33939; 
            transition: top 2s ease-in-out, left 2s ease-in-out, color 2s ease;
            white-space: nowrap;
        }

        #time {
            /* Menggunakan font Share Tech Mono agar lebih estetik & futuristik */
            font-family: 'Share Tech Mono', monospace;
            font-size: 26vw; 
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            letter-spacing: -2px;
        }

        #date {
            font-size: 4.5vw;
            margin-top: 5px;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Overlay Wajib Ketuk Pertama Kali -->
    <div id="start-screen" onclick="startSmartClock()">
        <h2>⚡ KETUK LAYAR ⚡</h2>
        <p>untuk mengaktifkan Smart Clock & Izin Suara</p>
    </div>

    <div id="clock-container">
        <div id="time">00:00</div>
        <div id="date">Memuat...</div>
    </div>

    <script>
        const amoledSafeColors = ['#b33939', '#8a2b06', '#9c8b35', '#4b7549', '#5b3a63', '#666666'];
        
        // JADWAL SHOLAT FINAL (Kecamatan Kedamean, Gresik)
        const jadwalSholat = {
            "04:12": "Subuh",
            "05:31": "Terbit",
            "11:27": "Zuhur",
            "14:49": "Asar",
            "17:23": "Magrib",
            "18:34": "Isya"
        };

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        const notes = {
            'G3': 196.00, 'A3': 220.00, 'B3': 246.94, 'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99, 'A5': 880.00
        };

        function playPiano(noteName, stepDelay) {
            return new Promise(resolve => {
                initAudio();
                const freq = notes[noteName];
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle'; 
                osc.frequency.value = freq;
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 1.5);

                // Volume diturunkan agar suara pembaca lebih dominan
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 3);
                setTimeout(resolve, stepDelay * 1000);
            });
        }

        function playVintageGong() {
            return new Promise(resolve => {
                initAudio();
                const duration = 4.5; 
                const osc1 = audioCtx.createOscillator(); 
                const osc2 = audioCtx.createOscillator(); 
                const osc3 = audioCtx.createOscillator(); 
                const gainNode = audioCtx.createGain();

                osc1.type = 'sine'; osc1.frequency.value = 130.81; 
                osc2.type = 'sine'; osc2.frequency.value = 261.63; 
                osc3.type = 'triangle'; osc3.frequency.value = 349.23; 

                // Volume diturunkan agar suara pembaca lebih dominan
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                osc1.connect(gainNode); osc2.connect(gainNode); osc3.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc1.start(); osc2.start(); osc3.start();
                osc1.stop(audioCtx.currentTime + duration);
                osc2.stop(audioCtx.currentTime + duration);
                osc3.stop(audioCtx.currentTime + duration);

                setTimeout(resolve, 1500); 
            });
        }

        async function playClassicMelody(hour12) {
            const melodies = {
                1: [ {n:'D4', d:0.5}, {n:'F#4', d:0.5}, {n:'A4', d:0.5}, {n:'F#4', d:0.5}, {n:'D4', d:0.5}, {n:'A3', d:0.5}, {n:'D4', d:0.5}, {n:'F#4', d:1.0} ], 
                2: [ {n:'E4', d:0.8}, {n:'C4', d:0.8}, {n:'D4', d:0.8}, {n:'G3', d:1.2}, {n:'G3', d:0.8}, {n:'D4', d:0.8}, {n:'E4', d:0.8}, {n:'C4', d:1.0} ], 
                3: [ {n:'E4', d:0.5}, {n:'E4', d:0.5}, {n:'F4', d:0.5}, {n:'G4', d:0.5}, {n:'G4', d:0.5}, {n:'F4', d:0.5}, {n:'E4', d:0.5}, {n:'D4', d:0.5}, {n:'C4', d:1.0} ], 
                4: [ {n:'G4', d:0.6}, {n:'D4', d:0.6}, {n:'G4', d:0.6}, {n:'D4', d:0.6}, {n:'G4', d:0.4}, {n:'B4', d:0.4}, {n:'D5', d:1.2} ], 
                5: [ {n:'E4', d:0.6}, {n:'E4', d:0.6}, {n:'G4', d:1.2}, {n:'E4', d:0.6}, {n:'E4', d:0.6}, {n:'G4', d:1.2} ], 
                6: [ {n:'D5', d:0.6}, {n:'C#5', d:0.6}, {n:'B4', d:0.6}, {n:'A4', d:0.6}, {n:'G4', d:0.6}, {n:'F#4', d:0.6}, {n:'E4', d:1.2} ], 
                7: [ {n:'E4', d:0.4}, {n:'E4', d:0.4}, {n:'E4', d:0.6}, {n:'C#5', d:0.5}, {n:'B4', d:0.5}, {n:'A4', d:0.5}, {n:'G#4', d:0.5}, {n:'A4', d:1.0} ], 
                8: [ {n:'C4', d:0.6}, {n:'C4', d:0.6}, {n:'G4', d:0.6}, {n:'G4', d:0.6}, {n:'A4', d:0.6}, {n:'A4', d:0.6}, {n:'G4', d:1.2} ], 
                9: [ {n:'C4', d:0.6}, {n:'C4', d:0.6}, {n:'E4', d:0.6}, {n:'G4', d:0.8}, {n:'G4', d:0.8}, {n:'E4', d:0.8}, {n:'C4', d:1.0} ], 
                10:[ {n:'B4', d:0.8}, {n:'E4', d:0.6}, {n:'F#4', d:0.6}, {n:'G4', d:0.6}, {n:'F#4', d:0.6}, {n:'E4', d:1.2} ], 
                11:[ {n:'E5', d:0.4}, {n:'D#5', d:0.4}, {n:'E5', d:0.4}, {n:'D#5', d:0.4}, {n:'E5', d:0.4}, {n:'B4', d:0.4}, {n:'D5', d:0.4}, {n:'C5', d:0.4}, {n:'A4', d:1.2} ], 
                12:[ {n:'G4', d:0.6}, {n:'E4', d:0.6}, {n:'D4', d:0.6}, {n:'C4', d:0.6}, {n:'D4', d:0.6}, {n:'E4', d:0.6}, {n:'C4', d:1.2} ] 
            };
            const song = melodies[hour12] || melodies[1];
            for (let note of song) { await playPiano(note.n, note.d); }
            await delay(500); 
        }

        function speak(text) {
            return new Promise(resolve => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.rate = 0.85; 
                utterance.pitch = 1.0; 
                utterance.volume = 1.0; // Maksimal
                utterance.onend = resolve;
                window.speechSynthesis.speak(utterance);
            });
        }

        let lastMinute = -1;

        async function triggerNotification(hour24, minute) {
            let hour12 = hour24 % 12;
            hour12 = hour12 ? hour12 : 12; 

            // LOGIKA DND: Aktif dari jam 22.00 sampai 03.59
            let isDND = (hour24 >= 22 || hour24 < 4);

            if (minute === 0) {
                if (hour24 === 22) {
                    await speak("Mode jangan ganggu telah diaktifkan. Waktunya mengistirahatkan tubuh dan pikiranmu setelah seharian beraktivitas. Selamat malam, selamat tidur, dan semoga hari esok membawa semangat serta peluang baru yang luar biasa.");
                    return; 
                }

                if (isDND) return;

                await playClassicMelody(hour12);
                
                let speechText = `Sekarang jam ${hour12} tepat.`;
                if (hour24 === 21) {
                    speechText += " Peringatan, fitur jangan ganggu akan diaktifkan pada jam 10 malam.";
                } else if (hour24 === 4) {
                    speechText += " Mode jangan ganggu dinonaktifkan.";
                }
                
                await speak(speechText);
                await delay(800);
                for(let i = 0; i < hour12; i++) { await playVintageGong(); }

            } else if (minute === 15 || minute === 30 || minute === 45) {
                if (isDND) return; 
                initAudio(); 
                await speak(`Sekarang jam ${hour12} lebih ${minute} menit.`);
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const currentTimeStr = `${hours}:${minutes}`;
            
            document.getElementById('time').innerText = currentTimeStr;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('id-ID', options);
            document.getElementById('date').innerText = dateString;

            if (now.getMinutes() !== lastMinute) {
                lastMinute = now.getMinutes();

                // 1. Cek Jadwal Sholat Terlebih Dahulu
                if (jadwalSholat[currentTimeStr]) {
                    initAudio();
                    if (jadwalSholat[currentTimeStr] === "Terbit") {
                        speak(`Selamat pagi! Saat ini telah memasuki waktu terbit, waktunya bangun dan memulai hari. Hari ini adalah hari ${dateString}. Awali pagi ini dengan rasa syukur dan senyuman. Terus semangat, semoga segala urusanmu hari ini dipermudah dan penuh dengan kebaikan.`);
                    } else {
                        speak(`Saat ini telah memasuki waktu sholat ${jadwalSholat[currentTimeStr]}.`);
                    }
                }

                // 2. Cek Notifikasi Jam & 15 Menitan
                if (lastMinute === 0 || lastMinute === 15 || lastMinute === 30 || lastMinute === 45) {
                    triggerNotification(now.getHours(), lastMinute);
                }

                // 3. Pixel Shifting untuk layar AMOLED
                const container = document.getElementById('clock-container');
                const randomTop = 45 + (Math.random() * 10); 
                const randomLeft = 45 + (Math.random() * 10); 
                container.style.top = `${randomTop}%`;
                container.style.left = `${randomLeft}%`;

                const randomColor = amoledSafeColors[Math.floor(Math.random() * amoledSafeColors.length)];
                container.style.color = randomColor;
            }
        }

        function requestFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } 
        }

        // FUNGSI MEMULAI JAM SECARA PENUH
        function startSmartClock() {
            initAudio(); // Memberikan izin sistem audio
            document.getElementById('start-screen').style.display = 'none'; // Sembunyikan overlay
            requestFullScreen(); // Meminta layar penuh
            
            // Sinkronkan data pertama kali lalu jalankan interval
            updateClock();
            setInterval(updateClock, 1000);
        }

        // Jalankan pembaruan visual saja (tanpa suara/pixel shifting) sebelum diketuk
        const initialNow = new Date();
        document.getElementById('time').innerText = `${String(initialNow.getHours()).padStart(2, '0')}:${String(initialNow.getMinutes()).padStart(2, '0')}`;
        document.getElementById('date').innerText = initialNow.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    </script>
</body>
</html>
